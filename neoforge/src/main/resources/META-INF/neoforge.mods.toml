modLoader="javafml"
loaderVersion="${neoloader_version}"
license="${license}"
issueTrackerURL="https://github.com/itssimple/.mod-issue-tracker"
logoFile= "icon.png"

[[mods]]
modId="${mod_id}"
version="${version}"
displayName="${mod_name}"
displayURL=""
authors="$mod_author"
description='''${description}'''

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    mandatory=true
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="SERVER"

[[dependencies.${mod_id}]]
    modId="obsidianweave"
    mandatory=true
    versionRange="[${obsidianweave_version},)"
    ordering="AFTER"
    side="SERVER"

[[mixins]]
    config="insomniamatters.mixins.json"